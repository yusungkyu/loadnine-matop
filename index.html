<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마력의 탑 - 실시간 위치 공유</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #1a1a1a; color: #fff; padding: 20px; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; }
        h2, h3 { margin-top: 0; color: #fff; }
        
        .panel { border: 1px solid #333; padding: 15px; margin-bottom: 15px; background: #222; border-radius: 6px; }

        .board-controls { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 12px; }
        .tabs { display: flex; gap: 6px; }
        
        .tab-btn { border: none; border-radius: 6px; padding: 9px 14px; background: #333; color: #fff; font-size: 14px; cursor: pointer; }
        .tab-btn.active { background: #2563eb; font-weight: bold; }
        .refresh-btn { border: none; border-radius: 6px; padding: 9px 14px; background: #2563eb; color: #fff; font-size: 14px; cursor: pointer; }
        .btn { border: none; border-radius: 6px; padding: 8px 12px; font-size: 13px; cursor: pointer; }
        .btn-blue { background: #2563eb; color: #fff; }
        .btn-red { background: #dc2626; color: #fff; margin-right: auto; }
        .btn-gray { background: #444; color: #fff; }
        .btn-delete-direct { border: none; border-radius: 4px; background: #dc2626; color: #fff; padding: 4px 8px; font-size: 12px; cursor: pointer; flex-shrink: 0; }

        .board-wrap { background: #000; border: 1px solid #333; border-radius: 6px; overflow: hidden; }
        .image-wrap { position: relative; width: 100%; line-height: 0; cursor: crosshair; touch-action: none; min-height: 300px; }
        .image-wrap img { display: block; width: 100%; height: auto; user-select: none; -webkit-user-drag: none; pointer-events: none; }
        .pin-layer { position: absolute; inset: 0; pointer-events: none; }

        /* 실시간 핀 디자인 및 애니메이션 (깜빡임 속도 0.5초) */
        .pin { 
            position: absolute; width: 18px; height: 18px; transform: translate(-50%, -50%); 
            border: 2px solid #fff; border-radius: 50%; background: #dc2626; 
            box-shadow: 0 2px 6px rgba(0,0,0,0.5); cursor: grab; z-index: 2;
            pointer-events: auto; touch-action: none;
            animation: blink-effect 0.5s infinite; 
        }
        .pin:active { cursor: grabbing; animation: none; opacity: 0.9; transform: translate(-50%, -50%) scale(1.2); }
        @keyframes blink-effect {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.4; transform: translate(-50%, -50%) scale(1.1); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        .pin-list { display: flex; flex-direction: column; max-height: 300px; overflow-y: auto; }
        .pin-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #333; gap: 10px; font-size: 13px; }
        .pin-item:last-child { border-bottom: none; }
        .pin-item span { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .modal-backdrop { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.7); z-index: 1000; padding: 16px; }
        .modal { width: 100%; max-width: 340px; background: #222; border: 1px solid #333; border-radius: 6px; padding: 16px; box-shadow: 0 10px 24px rgba(0,0,0,0.5); color: #fff; }
        .modal h3 { margin: 0 0 12px 0; font-size: 16px; border-bottom: 1px solid #333; padding-bottom: 6px; }
        .form-row { display: grid; grid-template-columns: 60px 1fr; align-items: center; gap: 6px; margin-bottom: 10px; }
        .form-row label { font-size: 13px; font-weight: bold; color: #ccc; }
        .form-row input, .form-row select { width: 100%; padding: 8px; font-size: 14px; border: 1px solid #444; border-radius: 4px; background: #333; color: #fff; }
        .view-value { padding: 8px; border: 1px solid #444; border-radius: 4px; background: #2b2b2b; font-size: 13px; color: #a3be8c; }
        .modal-buttons { display: flex; justify-content: flex-end; gap: 8px; margin-top: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="mainTitle" style="margin-bottom: 20px;">🏰 마력의 탑 실시간 맵</h2>
    
    <div class="board-controls">
        <div class="tabs" id="tabs">
            <button class="tab-btn active" data-id="floor1">1층</button>
            <button class="tab-btn" data-id="floor2">2층</button>
        </div>
        <button type="button" class="refresh-btn" id="refreshBtn">새로고침</button>
    </div>

    <div class="panel" style="padding: 10px;">
        <div class="board-wrap">
            <div class="image-wrap" id="imageWrap">
                <img id="bgImage" src="https://i.ibb.co/0RST75vn/1.png" alt="지도 배경">
                <div class="pin-layer" id="pinLayer"></div>
            </div>
        </div>
    </div>

    <div class="panel">
        <h3 id="listTitle">📍 1층 실시간 위치 목록</h3>
        <div class="pin-list" id="pinList"></div>
    </div>
</div>

<div class="modal-backdrop" id="createModalBackdrop"><div class="modal"><h3>핀 등록</h3><div class="form-row"><label>이름 :</label><input type="text" id="pinName" placeholder="이름 입력"></div><div class="form-row"><label>무기 :</label><select id="pinWeapon"><option value="입력 안함">입력 안함</option><option value="검과방패">검과방패</option><option value="전투봉">전투봉</option><option value="활">활</option><option value="석궁">석궁</option><option value="지팡이">지팡이</option><option value="사이드">사이드</option><option value="전투방패">전투방패</option><option value="단검">단검</option><option value="대검">대검</option><option value="맨손">맨손</option></select></div><div class="modal-buttons"><button class="btn btn-gray" id="cancelCreateBtn">취소</button><button class="btn btn-blue" id="saveBtn">저장</button></div></div></div>
<div class="modal-backdrop" id="viewModalBackdrop"><div class="modal"><h3>핀 정보</h3><div class="form-row"><label>이름 :</label><div class="view-value" id="viewName"></div></div><div class="form-row"><label>무기 :</label><div class="view-value" id="viewWeapon"></div></div><div class="modal-buttons"><button class="btn btn-red" id="deleteBtn">삭제</button><button class="btn btn-gray" id="closeViewBtn">닫기</button></div></div></div>

<script>
window.addEventListener('load', () => {
    // 🔗 Supabase 연결 설정
    const SUPABASE_URL = 'https://fmsjpwhuwsczhcjnhycg.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZtc2pwd2h1d3Njemhjam5oeWNnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5OTI0NjgsImV4cCI6MjA5NTU2ODQ2OH0.vb_-H7xVvcs0N-S2bf6iK7ZH6ryLxSl6uNhxHol-d5c';
    
    const PINS_TBL = 'pins_matop';

    let supabaseClient;
    let currentBoard = 'floor1';
    let pins = [];
    let pendingPoint = null;
    let selectedPin = null;

    try {
        if (typeof supabase !== 'undefined') {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            console.log('✅ Supabase 클라이언트 연결 완료');
            initApp();
        } else {
            throw new Error('Supabase 라이브러리 로딩에 실패했습니다.');
        }
    } catch (error) {
        console.error('❌ 초기화 오류:', error.message);
        alert('데이터베이스 연결 실패: ' + error.message);
        return;
    }

    function initApp() {
        loadMapData();
        // 실시간 변경 감지 (핀 위치, 등록, 삭제)
        supabaseClient.channel('map-changes').on('postgres_changes', { event: '*', schema: 'public', table: PINS_TBL }, () => loadMapData()).subscribe();
    }

    async function loadMapData() {
        try {
            const { data: p } = await supabaseClient.from(PINS_TBL).select('*').order('created_at', { ascending: true });
            pins = p || [];
            renderMap();
        } catch (e) {
            console.error("데이터 동기화 실패:", e);
        }
    }

    function renderMap() {
        const list = document.getElementById('pinList');
        const layer = document.getElementById('pinLayer');
        const img = document.getElementById('bgImage');
        const rect = img.getBoundingClientRect();
        
        document.getElementById('listTitle').textContent = currentBoard === 'floor1' ? '📍 1층 실시간 위치 목록' : '📍 2층 실시간 위치 목록';
        layer.innerHTML = '';
        list.innerHTML = '';
        
        const filtered = pins.filter(p => p.board_id === currentBoard);
        if (filtered.length === 0) {
            list.innerHTML = '<div style="color: #6b7280; font-size: 13px; padding: 6px 0;">등록된 실시간 위치가 없습니다.</div>';
        }

        filtered.forEach((p, i) => {
            const displayStr = p.name || `이름 : 무명 / 무기 : 입력 안함`;
            const splitName = displayStr.split(' / ');
            const n = splitName[0].replace('이름 : ', '').trim();
            const w = (splitName[1] || '').replace('무기 : ', '').trim();

            const btn = document.createElement('button');
            btn.className = 'pin';
            const leftPos = rect.width > 0 ? (p.x_ratio * rect.width) : (p.x_ratio * 100) + '%';
            const topPos = rect.height > 0 ? (p.y_ratio * rect.height) : (p.y_ratio * 100) + '%';
            btn.style.left = typeof leftPos === 'number' ? leftPos + 'px' : leftPos;
            btn.style.top = typeof topPos === 'number' ? topPos + 'px' : topPos;
            
            const handleDragStart = (e) => {
                e.preventDefault(); e.stopPropagation();
                let isDragging = false;
                const isTouch = e.type === 'touchstart';
                const moveEvent = isTouch ? 'touchmove' : 'mousemove';
                const upEvent = isTouch ? 'touchend' : 'mouseup';

                const startXRatio = p.x_ratio;
                const startYRatio = p.y_ratio;

                const onMove = (moveEv) => {
                    isDragging = true;
                    const clientX = isTouch ? moveEv.touches[0].clientX : moveEv.clientX;
                    const clientY = isTouch ? moveEv.touches[0].clientY : moveEv.clientY;
                    let newX = clientX - img.getBoundingClientRect().left;
                    let newY = clientY - img.getBoundingClientRect().top;
                    btn.style.left = Math.max(0, Math.min(newX, img.getBoundingClientRect().width)) + 'px';
                    btn.style.top = Math.max(0, Math.min(newY, img.getBoundingClientRect().height)) + 'px';
                };

                const onUp = async (upEv) => {
                    document.removeEventListener(moveEvent, onMove);
                    document.removeEventListener(upEvent, onUp);
                    
                    if (isDragging) {
                        const clientX = isTouch ? upEv.changedTouches[0].clientX : upEv.clientX;
                        const clientY = isTouch ? upEv.changedTouches[0].clientY : upEv.clientY;
                        let finalXRatio = (clientX - img.getBoundingClientRect().left) / img.getBoundingClientRect().width;
                        let finalYRatio = (clientY - img.getBoundingClientRect().top) / img.getBoundingClientRect().height;
                        
                        finalXRatio = Math.max(0, Math.min(finalXRatio, 1));
                        finalYRatio = Math.max(0, Math.min(finalYRatio, 1));

                        // 위치가 실제로 1% 이상 변했을 때만 DB 업데이트 (부하 방지)
                        if (Math.abs(startXRatio - finalXRatio) > 0.01 || Math.abs(startYRatio - finalYRatio) > 0.01) {
                            await supabaseClient.from(PINS_TBL).update({
                                x_ratio: finalXRatio,
                                y_ratio: finalYRatio
                            }).eq('id', p.id);
                        } else {
                            // 이동이 거의 없었으면 단순 클릭으로 간주
                            selectedPin = p; 
                            document.getElementById('viewName').textContent = n;
                            document.getElementById('viewWeapon').textContent = w;
                            document.getElementById('viewModalBackdrop').style.display = 'flex';
                        }
                    } else {
                        // 드래그가 아예 발생하지 않은 단순 클릭
                        selectedPin = p; 
                        document.getElementById('viewName').textContent = n;
                        document.getElementById('viewWeapon').textContent = w;
                        document.getElementById('viewModalBackdrop').style.display = 'flex';
                    }
                };
                document.addEventListener(moveEvent, onMove, { passive: false });
                document.addEventListener(upEvent, onUp);
            };

            btn.onmousedown = handleDragStart;
            btn.ontouchstart = handleDragStart;
            layer.appendChild(btn);
            
            // 삭제 버튼 클릭 시 즉시 삭제 (확인창 없음)
            list.innerHTML += `<div class="pin-item"><span>${i+1}. ${displayStr}</span><button class="btn-delete-direct" onclick="deletePin(${p.id})">삭제</button></div>`;
        });
    }

    // 목록에 있는 삭제 버튼
    window.deletePin = async (id) => {
        await supabaseClient.from(PINS_TBL).delete().eq('id', id);
        loadMapData();
    };

    // 모달창 닫기 이벤트
    document.querySelectorAll('.modal-backdrop').forEach(m => m.onclick = (e) => { if (e.target === m) m.style.display = 'none'; });
    document.getElementById('cancelCreateBtn').onclick = () => document.getElementById('createModalBackdrop').style.display = 'none';
    document.getElementById('closeViewBtn').onclick = () => document.getElementById('viewModalBackdrop').style.display = 'none';

    const registerPoint = (clientX, clientY, target) => {
        const rect = target.getBoundingClientRect();
        pendingPoint = { x: (clientX - rect.left) / rect.width, y: (clientY - rect.top) / rect.height };
        document.getElementById('pinName').value = '';
        document.getElementById('pinWeapon').selectedIndex = 0;
        document.getElementById('createModalBackdrop').style.display = 'flex';
    };

    // 맵 이미지 클릭 시 핀 등록 창 띄우기
    document.getElementById('imageWrap').onmousedown = (e) => { if (e.target.id === 'bgImage') registerPoint(e.clientX, e.clientY, e.target); };
    document.getElementById('imageWrap').ontouchstart = (e) => { if (e.target.id === 'bgImage') registerPoint(e.touches[0].clientX, e.touches[0].clientY, e.target); };

    // 핀 생성 버튼
    document.getElementById('saveBtn').onclick = async () => {
        if (!pendingPoint) return;
        await supabaseClient.from(PINS_TBL).insert({ 
            board_id: currentBoard, x_ratio: pendingPoint.x, y_ratio: pendingPoint.y, 
            name: `이름 : ${document.getElementById('pinName').value.trim() || '무명'} / 무기 : ${document.getElementById('pinWeapon').value}` 
        });
        document.getElementById('createModalBackdrop').style.display = 'none';
        loadMapData();
    };

    // 핀 정보 모달창 내 삭제 버튼 (확인창 없음)
    document.getElementById('deleteBtn').onclick = async () => {
        if (!selectedPin) return; 
        await supabaseClient.from(PINS_TBL).delete().eq('id', selectedPin.id);
        document.getElementById('viewModalBackdrop').style.display = 'none';
        loadMapData();
    };

    // 🔄 탭 전환 처리
    document.querySelectorAll('.tab-btn').forEach(b => b.onclick = (e) => {
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        e.target.classList.add('active');
        currentBoard = e.target.dataset.id;
        
        document.getElementById('bgImage').src = currentBoard === 'floor1' ? 'https://i.ibb.co/0RST75vn/1.png' : 'https://i.ibb.co/MD9V69Vm/2.png';
        document.getElementById('bgImage').onload = renderMap;
        renderMap(); 
    });

    document.getElementById('refreshBtn').onclick = () => { loadMapData(); };
    window.addEventListener('resize', renderMap);
});
</script>
</body>
</html>
