<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>검은마녀의탑 - 실시간 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #1a1a1a; color: #fff; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .panel { border: 1px solid #333; padding: 15px; margin-bottom: 10px; background: #222; border-radius: 6px; }
        
        /* 팝업 모달 스타일 */
        #welcome-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content { background: #2a2a2a; padding: 30px; border-radius: 10px; border: 1px solid #ebcb8b; text-align: center; }
        
        #log-container { display: flex; flex-direction: column; gap: 10px; min-height: 150px; }
        .witch-drag-item { 
            display: flex; justify-content: space-between; align-items: center;
            font-family: monospace; font-size: 0.95rem; color: #a3be8c; 
            border: 1px solid #444; background-color: #25282a; border-radius: 6px; padding: 14px; 
            cursor: grab; transition: background-color 0.2s;
        }
        .witch-drag-item.wt-dragging { opacity: 0.3 !important; border: 2px dashed #ebcb8b !important; }
        .witch-item-content { display: flex; align-items: center; pointer-events: none; user-select: none; }
        
        @keyframes forcePulse { 0% { opacity: 1; transform: scale(1.1); } 50% { opacity: 0.1; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1.1); } }
        .witch-blink-pin { display: inline-block; margin-right: 12px; font-size: 1.2rem; animation: forcePulse 1.0s infinite ease-in-out !important; }
        
        .witch-delete-btn { background-color: #bf616a; color: white; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; font-weight: bold; }
        .witch-delete-btn:hover { background-color: #d08770; }
    </style>
</head>
<body>

<div id="welcome-modal">
    <div class="modal-content">
        <h2>🏰 검은마녀의탑 안내</h2>
        <p id="modal-dresscode-info">데이터를 불러오는 중...</p>
        <button onclick="document.getElementById('welcome-modal').style.display='none'" class="witch-delete-btn">확인</button>
    </div>
</div>

<div class="container">
    <h2>🏰 검은마녀의탑 모니터링 대시보드</h2>
    <div class="panel"><h3>📍 실시간 유저 깊이(Depth) 현황</h3><div id="user-depth-display"></div></div>
    <div class="panel"><h3>📜 실시간 트랜잭션 로그</h3><div id="log-container"></div></div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const SUPABASE_URL = 'https://your-project-url.supabase.co';
    const SUPABASE_KEY = 'your-anon-key';
    let supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function fetchInitialData() {
        const { data, error } = await supabaseClient
            .from('user_tracking')
            .select('*')
            .order('created_at', { ascending: false });

        if (data && data.length > 0) {
            // 팝업에 드레스코드 연동
            document.getElementById('modal-dresscode-info').innerText = `최근 입장 유저의 드레스코드: ${data[0].dress_code || '미지정'}`;
            renderList(data);
        } else {
            document.getElementById('modal-dresscode-info').innerText = "현재 입장한 유저가 없습니다.";
        }
    }

    function renderList(items) {
        const logContainer = document.getElementById('log-container');
        logContainer.innerHTML = ''; 
        items.forEach(item => logContainer.appendChild(createLogElement(item)));
        if (items[0]) document.getElementById('user-depth-display').innerText = `최근 깊이: ${items[0].depth}m`;
    }

    function createLogElement(item) {
        const logItem = document.createElement('div');
        logItem.className = 'witch-drag-item'; 
        logItem.draggable = true; 
        logItem.id = `pin-${item.id}`;
        
        logItem.addEventListener('dragstart', () => logItem.classList.add('wt-dragging'));
        logItem.addEventListener('dragend', () => logItem.classList.remove('wt-dragging'));
        
        const dressCodeText = item.dress_code || '미지정';
        logItem.innerHTML = `
            <div class="witch-item-content">
                <span class="witch-blink-pin">📌</span>
                <span class="witch-text">유저 ID: ${item.user_id} | 깊이: ${item.depth}m | 드레스코드: ${dressCodeText}</span>
            </div>
            <button class="witch-delete-btn" onclick="deleteItem('${item.id}')">삭제</button>
        `;
        return logItem;
    }

    window.deleteItem = async (id) => {
        await supabaseClient.from('user_tracking').delete().eq('id', id);
    };

    // 드래그 정렬 엔진
    const logContainer = document.getElementById('log-container');
    logContainer.addEventListener('dragover', (e) => {
        e.preventDefault();
        const dragging = document.querySelector('.wt-dragging');
        const siblings = [...logContainer.querySelectorAll('.witch-drag-item:not(.wt-dragging)')];
        const next = siblings.find(sib => e.clientY <= sib.getBoundingClientRect().top + sib.offsetHeight / 2);
        logContainer.insertBefore(dragging, next);
    });

    fetchInitialData();
});
</script>
</body>
</html>
