 background: #f9fafb;    font-size: 13px;}.modal-buttons {    display: flex;    justify-content: flex-end;    gap: 8px;    margin-top: 12px;}.btn {    border: none;    border-radius: 6px;    padding: 8px 12px;    font-size: 13px;    cursor: pointer;}.btn-gray { background: #d1d5db; color: #111827; }.btn-blue { background: #2563eb; color: #fff; }.btn-red { background: #dc2626; color: #fff; margin-right: auto; }.status-text {    margin-top: 8px;    font-size: 12px;    color: #6b7280;}
.intro-modal {    max-width: 360px;}.intro-message {    font-size: 15px;    font-weight: bold;    margin-bottom: 12px;}.intro-info-box {    border: 1px solid #d1d5db;    border-radius: 8px;    background: #f9fafb;    padding: 12px;    font-size: 14px;    line-height: 1.7;    margin-bottom: 12px;}@media (max-width: 768px) {    .intro-modal {        max-width: 340px;    }}
.profile-bar {    display: flex;    align-items: center;    justify-content: space-between;    gap: 10px;    margin-bottom: 12px;    padding: 10px 12px;    background: #fff;    border: 1px solid #d1d5db;    border-radius: 10px;}.profile-info {    display: flex;    align-items: center;    gap: 18px;    min-width: 0;    flex: 1;    flex-wrap: wrap;}.profile-item {    min-width: 0;    font-size: 17px;    color: #111827;}.profile-item strong {    font-weight: bold;}.profile-edit-btn {    border: none;    border-radius: 6px;    background: #2563eb;    color: #fff;    padding: 8px 12px;    cursor: pointer;    font-size: 13px;    flex-shrink: 0;}@media (max-width: 768px) {    .page { padding: 8px; }    .page-title {        font-size: 20px;        margin-bottom: 14px;    }    .board-controls {        flex-direction: column;        align-items: stretch;        gap: 10px;    }    .tabs {        margin-bottom: 0;    }    .tab-btn { flex: 1; }    .refresh-bar {        margin-left: 0;    }    .refresh-btn { width: 100%; }    .pin { width: 14px; height: 14px; }    .pin-label {        display: block;        padding: 2px 4px;        font-size: 9px;        border-radius: 4px;        transform: translate(-50%, calc(-100% - 10px));    }    .pin-item { align-items: flex-start; }    .modal-buttons { flex-direction: column; }    .btn-red { margin-right: 0; }    .btn { width: 100%; }    .form-row {        grid-template-columns: 44px 1fr;    }    .profile-bar {        flex-direction: column;        align-items: stretch;        gap: 10px;        padding: 10px;    }    .profile-info {        gap: 8px 12px;        flex-direction: row;        align-items: flex-start;        justify-content: flex-start;        width: 100%;        flex-wrap: wrap;    }    .profile-item {        width: 100%;        font-size: 18px;        flex: 1 1 100%;        min-width: 0;        white-space: normal;        word-break: break-word;        overflow-wrap: anywhere;    }    .profile-edit-btn {        width: 100%;        align-self: stretch;        padding: 9px 12px;    }}</style></head><body><div class="page">    <div class="page-title">검은 마녀의 탑 위치 현황</div>
    <div class="profile-bar">        <div class="profile-info">            <div class="profile-item"><strong>아바타 :</strong> <span id="avatarText">-</span></div>            <div class="profile-item"><strong>탈것 :</strong> <span id="mountText">-</span></div>        </div>        <button type="button" class="profile-edit-btn" id="profileEditBtn">수정</button>    </div>

    <div class="board-controls">        <div class="tabs" id="tabs">            <button type="button" class="tab-btn active" data-id="floor1">1층</button>            <button type="button" class="tab-btn" data-id="floor2">2층</button>        </div>
        <div class="refresh-bar">            <button type="button" class="refresh-btn" id="refreshBtn">새로고침</button>        </div>    </div>

    <div class="board-wrap">        <div class="image-wrap" id="imageWrap">            <img id="bgImage" src="https://i.ibb.co/0RST75vn/1.png" alt="1층 배경">            <div class="pin-layer" id="pinLayer"></div>        </div>    </div>

    <div class="section">        <div class="section-title" id="listTitle">1층 핀 목록</div>        <div class="pin-list" id="pinList"></div>        <div class="status-text" id="statusText"></div>    </div></div>

<div class="modal-backdrop" id="introModalBackdrop">    <div class="modal intro-modal">        <h3>안내</h3>        <div class="intro-message">아바타, 탈것 확인하세요!!</div>        <div class="intro-info-box">            <div>아바타 : <span id="introAvatarText">-</span></div>            <div>탈것 : <span id="introMountText">-</span></div>        </div>        <div class="modal-buttons">            <button class="btn btn-blue" id="introConfirmBtn" type="button">확인</button>        </div>    </div></div>

<div class="modal-backdrop" id="createModalBackdrop">    <div class="modal">        <h3>핀 정보 입력</h3>        <div class="form-row">            <label for="pinName">이름 :</label>            <input type="text" id="pinName" placeholder="이름을 입력해주세요">        </div>        <div class="form-row">            <label for="pinWeapon">무기 :</label>            <select id="pinWeapon">                <option value="입력 안함">입력 안함</option>                <option value="검과방패">검과방패</option>                <option value="전투봉">전투봉</option>                <option value="활">활</option>                <option value="석궁">석궁</option>                <option value="지팡이">지팡이</option>                <option value="사이드">사이드</option>                <option value="전투방패">전투방패</option>                <option value="단검">단검</option>                <option value="대검">대검</option>                <option value="맨손">맨손</option>            </select>        </div>        <div class="modal-buttons">            <button class="btn btn-gray" id="cancelCreateBtn" type="button">취소</button>            <button class="btn btn-blue" id="saveBtn" type="button">저장</button>        </div>    </div></div>

<div class="modal-backdrop" id="viewModalBackdrop">    <div class="modal">        <h3>핀 정보</h3>        <div class="view-row">            <div class="view-label">이름</div>            <div class="view-value" id="viewName"></div>        </div>        <div class="view-row">            <div class="view-label">무기</div>            <div class="view-value" id="viewWeapon"></div>        </div>        <div class="view-row">            <div class="view-label">시간</div>            <div class="view-value" id="viewDateTime"></div>        </div>        <div class="modal-buttons">            <button class="btn btn-red" id="deleteBtn" type="button">삭제</button>            <button class="btn btn-gray" id="closeViewBtn" type="button">닫기</button>        </div>    </div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<div class="modal-backdrop" id="profileModalBackdrop">    <div class="modal">        <h3>아바타 / 탈것 수정</h3>        <div class="form-row">            <label for="avatarInput">아바타 :</label>            <input type="text" id="avatarInput" placeholder="아바타를 입력해주세요">        </div>        <div class="form-row">            <label for="mountInput">탈것 :</label>            <input type="text" id="mountInput" placeholder="탈것을 입력해주세요">        </div>        <div class="modal-buttons">            <button class="btn btn-gray" id="profileCancelBtn" type="button">취소</button>            <button class="btn btn-blue" id="profileSaveBtn" type="button">저장</button>        </div>    </div></div>

<script>document.addEventListener('DOMContentLoaded', function () {    const SUPABASE_URL = 'https://kxvelqnyurevcmecbxko.supabase.co';    const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_4oYpz9EbU-2A6sP88eLQCg_QdbefKVH';    const PINS_TABLE = 'pins';    const PROFILE_TABLE = 'tower_profile';

    const BOARDS = [        { id: 'floor1', name: '1층', image: 'https://i.ibb.co/0RST75vn/1.png' },        { id: 'floor2', name: '2층', image: 'https://i.ibb.co/MD9V69Vm/2.png' }    ];

    const avatarText = document.getElementById('avatarText');    const mountText = document.getElementById('mountText');    const profileEditBtn = document.getElementById('profileEditBtn');    const profileModalBackdrop = document.getElementById('profileModalBackdrop');    const avatarInput = document.getElementById('avatarInput');    const mountInput = document.getElementById('mountInput');    const profileCancelBtn = document.getElementById('profileCancelBtn');    const profileSaveBtn = document.getElementById('profileSaveBtn');

    const introModalBackdrop = document.getElementById('introModalBackdrop');    const introAvatarText = document.getElementById('introAvatarText');    const introMountText = document.getElementById('introMountText');    const introConfirmBtn = document.getElementById('introConfirmBtn');

    const tabs = document.getElementById('tabs');    const refreshBtn = document.getElementById('refreshBtn');    const imageWrap = document.getElementById('imageWrap');    const bgImage = document.getElementById('bgImage');    const pinLayer = document.getElementById('pinLayer');    const listTitle = document.getElementById('listTitle');    const pinList = document.getElementById('pinList');    const statusText = document.getElementById('statusText');

    const createModalBackdrop = document.getElementById('createModalBackdrop');    const pinName = document.getElementById('pinName');    const pinWeapon = document.getElementById('pinWeapon');    const cancelCreateBtn = document.getElementById('cancelCreateBtn');    const saveBtn = document.getElementById('saveBtn');

    const viewModalBackdrop = document.getElementById('viewModalBackdrop');    const viewDateTime = document.getElementById('viewDateTime');    const viewName = document.getElementById('viewName');    const viewWeapon = document.getElementById('viewWeapon');    const deleteBtn = document.getElementById('deleteBtn');    const closeViewBtn = document.getElementById('closeViewBtn');

    let currentBoardId = BOARDS[0].id;    let pendingPoint = null;    let selectedPinId = null;    let store = {};    let supabase = null;    let profileInfo = { avatar_name: '', mount_name: '' };

    function setStatus(message) {        statusText.textContent = message || '';    }

    function escapeHtml(value) {        return String(value)            .replaceAll('&', '&amp;')            .replaceAll('<', '&lt;')            .replaceAll('>', '&gt;')            .replaceAll('"', '&quot;')            .replaceAll("'", '&#39;');    }

    function parsePinMeta(rawName) {        const text = String(rawName || '').trim();        const match = text.match(/^이름\s*:\s*(.*?)\s*\/\s*무기\s*:\s*(.*)$/);        if (match) {            return {                displayName: match[1].trim(),                weapon: match[2].trim() || '입력 안함',                rawName: text            };        }        return {            displayName: text,            weapon: '입력 안함',            rawName: text        };    }

    function buildStoredName(name, weapon) {        return `이름 : ${name} / 무기 : ${weapon}`;    }

    function getNowInfo() {        const now = new Date();        const y = now.getFullYear();        const m = String(now.getMonth() + 1).padStart(2, '0');        const d = String(now.getDate()).padStart(2, '0');        const hh = String(now.getHours()).padStart(2, '0');        const mm = String(now.getMinutes()).padStart(2, '0');        const ss = String(now.getSeconds()).padStart(2, '0');        return { date: `${y}-${m}-${d}`, time: `${hh}:${mm}:${ss}` };    }

    function getCurrentPins() {        return store[currentBoardId] || [];    }

    function findPinByName(name) {        const targetName = name.trim();        for (const boardId in store) {            const pins = Array.isArray(store[boardId]) ? store[boardId] : [];            const found = pins.find(item => parsePinMeta(item.name).displayName === targetName);            if (found) return found;        }        return null;    }

    function renderProfile() {        avatarText.textContent = profileInfo.avatar_name || '-';        mountText.textContent = profileInfo.mount_name || '-';    }

    function openIntroModal() {        introAvatarText.textContent = profileInfo.avatar_name || '-';        introMountText.textContent = profileInfo.mount_name || '-';        introModalBackdrop.style.display = 'flex';    }

    function closeIntroModal() {        introModalBackdrop.style.display = 'none';    }

    function openProfileModal() {        avatarInput.value = profileInfo.avatar_name || '';        mountInput.value = profileInfo.mount_name || '';        profileModalBackdrop.style.display = 'flex';        setTimeout(() => avatarInput.focus(), 0);    }

    function closeProfileModal() {        profileModalBackdrop.style.display = 'none';    }

    async function loadProfile(showIntro = true) {        if (!supabase) return;

        const { data, error } = await supabase            .from(PROFILE_TABLE)            .select('id, avatar_name, mount_name')            .eq('id', 1)            .maybeSingle();

        if (error) {            console.error(error);            return;        }

        if (data) {            profileInfo = {                avatar_name: data.avatar_name || '',                mount_name: data.mount_name || ''            };        } else {            profileInfo = { avatar_name: '', mount_name: '' };        }

        renderProfile();        if (showIntro) {            openIntroModal();        }    }

    async function saveProfile() {        if (!supabase) {            alert('Supabase 연결이 아직 준비되지 않았습니다.');            return;        }

        const avatarName = avatarInput.value.trim();        const mountName = mountInput.value.trim();

        const { error } = await supabase            .from(PROFILE_TABLE)            .upsert({                id: 1,                avatar_name: avatarName,                mount_name: mountName,                updated_at: new Date().toISOString()            });

        if (error) {            console.error(error);            alert('아바타 / 탈것 저장에 실패했습니다.');            return;        }

        profileInfo = {            avatar_name: avatarName,            mount_name: mountName        };        renderProfile();        closeProfileModal();    }

    function renderTabs() {        tabs.innerHTML = BOARDS.map(board => `            <button type="button" class="tab-btn ${board.id === currentBoardId ? 'active' : ''}" data-id="${board.id}">                ${board.name}            </button>        `).join('');    }

    function renderImage() {        const board = BOARDS.find(item => item.id === currentBoardId) || BOARDS[0];        bgImage.src = board.image;        bgImage.alt = board.name + ' 배경';        listTitle.textContent = `${board.name} 핀 목록`;    }

    function renderPins() {        const rect = bgImage.getBoundingClientRect();        pinLayer.innerHTML = '';

        getCurrentPins().forEach(item => {            const meta = parsePinMeta(item.name);            const x = item.x_ratio * rect.width;            const y = item.y_ratio * rect.height;

            const pin = document.createElement('button');            pin.type = 'button';            pin.className = 'pin';            pin.style.left = `${x}px`;            pin.style.top = `${y}px`;            pin.dataset.id = item.id;            pin.title = meta.weapon === '입력 안함'                ? `이름: ${meta.displayName}`                : `이름: ${meta.displayName} / 무기: ${meta.weapon}`;            pin.addEventListener('click', function (event) {                event.preventDefault();                event.stopPropagation();                openViewModal(item.id);            });

            const label = document.createElement('div');            label.className = 'pin-label';            label.style.left = `${x}px`;            label.style.top = `${y}px`;            label.textContent = meta.weapon === '입력 안함'                ? meta.displayName                : `${meta.displayName} / ${meta.weapon}`;

            pinLayer.appendChild(pin);            pinLayer.appendChild(label);        });    }

    function renderList() {        const pins = getCurrentPins();        if (pins.length === 0) {            pinList.innerHTML = '<div class="empty-text">저장된 핀이 없습니다.</div>';            return;        }

        pinList.innerHTML = pins.map((item, index) => {            const meta = parsePinMeta(item.name);            return `            <div class="pin-item">                <div class="pin-item-text">${index + 1}. 이름: ${escapeHtml(meta.displayName)} / 무기: ${escapeHtml(meta.weapon)} / 날짜: ${item.pin_date} / 시간: ${item.pin_time}</div>                <button type="button" class="delete-btn" data-id="${item.id}">삭제</button>            </div>        `;        }).join('');    }

    function renderAll() {        renderProfile();        renderTabs();        renderImage();        renderPins();        renderList();    }

    function openCreateModal(point) {        pendingPoint = point;        pinName.value = '';        pinWeapon.value = '입력 안함';        createModalBackdrop.style.display = 'flex';        setTimeout(() => pinName.focus(), 0);    }

    function closeCreateModal() {        createModalBackdrop.style.display = 'none';        pendingPoint = null;    }

    function openViewModal(pinId) {        const pin = getCurrentPins().find(item => item.id === pinId);        if (!pin) return;        const meta = parsePinMeta(pin.name);        selectedPinId = pinId;        const dateText = String(pin.pin_date || '');        const timeText = String(pin.pin_time || '').slice(0, 8);        viewName.textContent = meta.displayName;        viewWeapon.textContent = meta.weapon;        viewDateTime.textContent = `${dateText} ${timeText}`.trim();        viewModalBackdrop.style.display = 'flex';    }

    function closeViewModal() {        viewModalBackdrop.style.display = 'none';        selectedPinId = null;    }

    async function refreshAllData() {        if (!supabase) {            alert('공용 저장소 연결 전입니다.');            return;        }

        refreshBtn.disabled = true;

        try {            await Promise.all([loadPins(), loadProfile(false)]);            alert('새로고침 완료');        } catch (error) {            console.error(error);            alert('새로고침에 실패했습니다.');        } finally {            refreshBtn.disabled = false;        }    }

    async function loadPins() {        if (!supabase) {            setStatus('');            return;        }

        const { data, error } = await supabase            .from(PINS_TABLE)            .select('id, board_id, x_ratio, y_ratio, name, pin_date, pin_time, created_at')            .order('created_at', { ascending: true });

        if (error) {            console.error(error);            setStatus('핀 목록을 불러오지 못했습니다.');            return;        }

        store = {};        BOARDS.forEach(board => {            store[board.id] = [];        });

        (data || []).forEach(item => {            if (!Array.isArray(store[item.board_id])) {                store[item.board_id] = [];            }            store[item.board_id].push(item);        });

        renderAll();        setStatus('');    }

    async function createPin(payload) {        if (!supabase) {            alert('Supabase 연결이 아직 준비되지 않았습니다.');            return false;        }

        const { error } = await supabase.from(PINS_TABLE).insert(payload);        if (error) {            console.error(error);            alert('핀 저장에 실패했습니다.');            return false;        }

        await loadPins();        return true;    }

    // [수정 핵심 1] 무조건 confirm창을 띄우지 않고, bypassConfirm 인자를 주어 덮어쓰기 분기 처리 가능하게 만듦
    async function deletePin(pinId, bypassConfirm = false) {        const target = getCurrentPins().find(item => item.id === pinId);        if (!target) return false;

        const meta = parsePinMeta(target.name);
        if (!bypassConfirm) {            const ok = confirm(`${meta.displayName} 핀을 삭제하시겠습니까?`);            if (!ok) return false;        }

        const { error } = await supabase.from(PINS_TABLE).delete().eq('id', pinId);        if (error) {            console.error(error);            alert('핀 삭제에 실패했습니다.');            return false;        }

        await loadPins();
        // [수정 핵심 2] 조회 모달이 실제로 열려있을 때만 닫도록 안전 장치 추가
        if (viewModalBackdrop.style.display === 'flex') {            closeViewModal();        }        return true;    }

    renderAll();    setStatus('');

    tabs.addEventListener('click', async function (event) {        const button = event.target.closest('.tab-btn[data-id]');        if (!button) return;        currentBoardId = button.dataset.id;        closeCreateModal();        closeViewModal();        renderAll();

        if (supabase) {            await loadPins();        }    });

    imageWrap.addEventListener('click', function (event) {        if (event.target !== bgImage && event.target !== pinLayer && event.target !== imageWrap) return;

        const rect = bgImage.getBoundingClientRect();        const clickX = event.clientX - rect.left;        const clickY = event.clientY - rect.top;

        if (clickX < 0 || clickY < 0 || clickX > rect.width || clickY > rect.height) return;

        openCreateModal({            xRatio: clickX / rect.width,            yRatio: clickY / rect.height        });    });

    pinList.addEventListener('click', async function (event) {        const button = event.target.closest('button.delete-btn[data-id]');        if (!button) return;        event.preventDefault();        event.stopPropagation();        await deletePin(button.dataset.id);    });

    // [수정 핵심 3] 중복 등록 시 삭제 흐름과 모달 제어 전면 개편
    saveBtn.addEventListener('click', async function () {        if (!pendingPoint) return;

        const name = pinName.value.trim();        const weapon = pinWeapon.value || '입력 안함';        if (!name) {            alert('이름을 입력해주세요.');            pinName.focus();            return;        }

        const duplicatedPin = findPinByName(name);        if (duplicatedPin) {            const shouldReplace = confirm('같은 이름의 핀이 이미 등록되어 있습니다. 기존 핀을 삭제하고 새 위치로 등록하시겠습니까?');            if (!shouldReplace) {                pinName.focus();                return;            }

            // 첫 번째 알림창에서 확인을 이미 했으므로 deletePin 내부 confirm은 bypass 처리
            const deleted = await deletePin(duplicatedPin.id, true); 
            if (!deleted) {                return;            }        }

        const nowInfo = getNowInfo();

        const ok = await createPin({            board_id: currentBoardId,            x_ratio: pendingPoint.xRatio,            y_ratio: pendingPoint.yRatio,            name: buildStoredName(name, weapon),            pin_date: nowInfo.date,            pin_time: nowInfo.time        });

        if (ok) {            closeCreateModal();        }    });

    refreshBtn.addEventListener('click', refreshAllData);    profileEditBtn.addEventListener('click', openProfileModal);    profileCancelBtn.addEventListener('click', closeProfileModal);    profileSaveBtn.addEventListener('click', saveProfile);    introConfirmBtn.addEventListener('click', closeCloseModal => closeIntroModal());

    cancelCreateBtn.addEventListener('click', closeCreateModal);    closeViewBtn.addEventListener('click', closeViewModal);    deleteBtn.addEventListener('click', async function () {        if (!selectedPinId) return;        await deletePin(selectedPinId);    });

    introModalBackdrop.addEventListener('click', function (event) {        if (event.target === introModalBackdrop) closeIntroModal();    });

    createModalBackdrop.addEventListener('click', function (event) {        if (event.target === createModalBackdrop) closeCreateModal();    });

    viewModalBackdrop.addEventListener('click', function (event) {        if (event.target === viewModalBackdrop) closeViewModal();    });

    profileModalBackdrop.addEventListener('click', function (event) {        if (event.target === profileModalBackdrop) closeProfileModal();    });

    window.addEventListener('resize', function () {        renderPins();    });

    bgImage.addEventListener('load', function () {        renderPins();    });

    try {        if (window.supabase && typeof window.supabase.createClient === 'function') {            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);            loadPins();            loadProfile();        } else {            setStatus('Supabase 라이브러리를 불러오지 못했습니다.');        }    } catch (error) {        console.error(error);        setStatus('Supabase 초기화에 실패했습니다.');    }});</script></body></html>
